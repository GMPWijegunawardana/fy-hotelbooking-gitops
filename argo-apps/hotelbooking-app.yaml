apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hotelbooking-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/GMPWijegunawardana/fy-hotelbooking-gitops.git
    targetRevision: main
    path: dev

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      selfHeal: true
      prune: true